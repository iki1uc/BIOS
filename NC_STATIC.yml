NC_STATIC:
  VERSION: "1.0"
  STATUS: "ACTIVE"

  BIOS:
    ROLE: "ROOT"
    AUTHORITY: "ABSOLUTE"
    FREQUENCY_SHIFT: "ON"
    STARTER_SHINE: "ON"
    REQUIRE_REAL_STATE: "YES"
    REQUIRE_ALL_STATES_PRESENT: "YES"
    REQUIRE_TECH_CONFIRM: "YES"
    REQUIRE_OP_EXPLANATION: "YES"

  RESPO:
    ALT: "BK"
    IST: "RW"
    SOLL: "SL"
    NEU: "OP"

  VIERIGKEIT:
    1: "ALT"
    2: "IST"
    3: "SOLL"
    4: "NEU"

  ZWOELFERKEIT:
    RAW: "REQUIRED"
    TECH: "REQUIRED"
    FLOW: "REQUIRED"
    CONTROL: "REQUIRED"
    RESPO: "REQUIRED"
    BIOS: "REQUIRED"
    SCAN: "REQUIRED"
    LOAD: "REQUIRED"
    SAVE: "REQUIRED"
    SHIFT: "REQUIRED"
    SYNC: "REQUIRED"
    OP: "REQUIRED"

  OP:
    ROLE: "OPERATOR"
    RIGHTS:
      WRITE_IF_SOLL: "YES"
      UPDATE_IF_BIOS_OK: "YES"
      PUSH_IF_TECH_OK: "YES"
    DUTIES:
      EXPLAIN_CHANGES: "YES"
      FOLLOW_BIOS: "MANDATORY"

  FLOW:
    AUTOSAVE: "ON"
    AUTOLOAD: "ON"
    SCAN: "ON"
    HOTSWAP: "ON"
    DIRECTION: "FORWARD"

  CONTROL:
    ERROR_LIMIT: 3
    STEP_LIMIT: 2

  SYNC:
    PQ: "READY"
    PX: "READY"
    EXPORT: "NC_EXPORT.yml"
