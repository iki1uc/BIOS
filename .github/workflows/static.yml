name: NC STATIC CHECK

on:
  push:
    paths:
      - "root.yml"
      - "NC/**"
  workflow_dispatch:

jobs:
  static_check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ROOT-SIGNAL LADEN
        run: cat root.yml

      - name: NC-STRUKTUR PRÜFEN
        run: |
          test -f NC/RW/state.json
          test -f NC/SL/edit.json
          test -f NC/BK/backup.json
          test -f NC/OP/OP.json

      - name: SIGNAL-ANALYSE
        run: |
          grep -q 'SIGNAL: "ACTIVE"' root.yml
          grep -q 'AUTOSAVE: "ON"' root.yml
          grep -q 'AUTOLOAD: "ON"' root.yml
          grep -q 'SCAN: "ON"' root.yml
          grep -q 'HOTSWAP: "ON"' root.yml
