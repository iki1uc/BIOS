name: NC STATIC CHECK

on:
  push:
    paths:
      - "root.yml"
      - "NC/**"
  workflow_dispatch:

jobs:
  static_check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ROOT-SIGNAL LADEN
        run: cat root.yml

      - name: NC-STRUKTUR PRÜFEN
        run: ls -R NC

      - name: SIGNAL-ANALYSE
        run: |
          echo "SIGNAL-ANALYSE:"
          grep -q "ACTIVE" root.yml && echo "SYSTEM = JA" || echo "SYSTEM = NEIN"
