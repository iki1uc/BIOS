name: NC RESPO ENGINE

on:
  workflow_dispatch:

jobs:
  engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- BIOS ROOT CHECK ---
      - name: BIOS PRÜFEN
        id: bios
        run: |
          if grep -q 'ROLE: "ROOT"' NC_STATIC_ROOT.yml; then
            echo "bios=OK" >> $GITHUB_OUTPUT
          else
            echo "bios=FAIL" >> $GITHUB_OUTPUT
          fi

      - name: STOP WENN BIOS FAIL
        if: steps.bios.outputs.bios == 'FAIL'
        run: exit 1

      # --- REAL STATE CHECK ---
      - name: REAL STATE PRÜFEN
        id: real
        run: |
          if [ -f NC/RW/state.json ] && [ -f NC/SL/edit.json ] && [ -f NC/BK/backup.json ] && [ -f NC/OP/OP.json ]; then
            echo "real=OK" >> $GITHUB_OUTPUT
          else
            echo "real=FAIL" >> $GITHUB_OUTPUT
          fi

      - name: STOP WENN REAL FAIL
        if: steps.real.outputs.real == 'FAIL'
        run: exit 1

      # --- TECH CHECK ---
      - name: TECH PRÜFEN
        id: tech
        run: |
          if [ -d NC/TECH ]; then
            echo "tech=OK" >> $GITHUB_OUTPUT
          else
            echo "tech=FAIL" >> $GITHUB_OUTPUT
          fi

      - name: STOP WENN TECH FAIL
        if: steps.tech.outputs.tech == 'FAIL'
        run: exit 1

      # --- AUTOSAVE ---
      - name: AUTOSAVE (RW -> BK)
        run: cp NC/RW/state.json NC/BK/backup.json

      # --- AUTOLOAD ---
      - name: AUTOLOAD (SL -> RW)
        run: cp NC/SL/edit.json NC/RW/state.json

      # --- SCAN ---
      - name: SCAN
        run: ls -R NC
