<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>NC TECH-Wand</title>
  <style>
    body {
      background: #0d0d0d;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 { margin-bottom: 30px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 180px);
      gap: 20px;
    }
    .btn {
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      font-size: 18px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
    }
    .rw { background: #0a0; }
    .op { background: #cc0; color: #000; }
    .sl { background: #dd0; color: #000; }
    .bk { background: #a00; }
  </style>
</head>
<body>
  <h1>NC TECH-Wand</h1>
  <div class="grid">
    <a class="btn rw" href="NC/RW/state.json">RW – REAL</a>
    <a class="btn op" href="NC/OP/OP.json">OP – REINRAUM</a>
    <a class="btn sl" href="NC/SL/edit.json">SL – SOLL</a>
    <a class="btn bk" href="NC/BK/backup.json">BK – BACKUP</a>
  </div>
</body>
</html>
